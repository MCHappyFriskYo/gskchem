<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GSKChem · 化竞幻想乡 | 主页与联考</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #eef5ec 0%, #dae8d4 100%);
            color: #1c2e1f;
            line-height: 1.5;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(70, 110, 70, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(70, 110, 70, 0.04) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }
        .app {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .navbar {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(16px);
            box-shadow: 0 4px 16px -6px rgba(0, 0, 0, 0.08);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(80, 120, 80, 0.2);
        }
        .nav-container {
            max-width: 1320px;
            margin: 0 auto;
            padding: 0.6rem 1.8rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(43, 110, 60, 0.08);
            padding: 0.4rem 1rem 0.4rem 0.8rem;
            border-radius: 3rem;
            transition: all 0.2s;
        }
        .logo-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, #2b6e3c, #1a4a2a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .logo-text {
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #1c5a2d, #0e3a1a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .nav-links {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem 1.2rem;
            align-items: center;
        }
        .nav-links a {
            text-decoration: none;
            font-weight: 600;
            font-size: 0.92rem;
            color: #2a4b30;
            padding: 0.4rem 0.2rem;
            transition: 0.2s;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
        }
        .nav-links a:hover {
            color: #146b2e;
            border-bottom-color: #4c9f70;
        }
        .nav-links a.active {
            color: #146b2e;
            border-bottom-color: #2b6e3c;
        }
        .auth-nav-btn {
            background: linear-gradient(105deg, #2b6e3c, #1f5430);
            border: none;
            padding: 0.55rem 1.3rem;
            border-radius: 2.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: white;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            box-shadow: 0 4px 10px -4px rgba(0, 0, 0, 0.2);
            font-family: inherit;
            letter-spacing: 0.3px;
            margin-left: 0.5rem;
        }
        .auth-nav-btn i { font-size: 1rem; }
        .auth-nav-btn:hover {
            background: linear-gradient(105deg, #1f5430, #154623);
            transform: translateY(-2px);
            box-shadow: 0 8px 18px -6px rgba(0, 0, 0, 0.25);
        }
        @media (max-width: 880px) {
            .nav-container { flex-direction: column; gap: 0.6rem; align-items: stretch; }
            .nav-links { justify-content: center; overflow-x: auto; padding-bottom: 0.3rem; }
            .logo-area { align-self: center; }
            .auth-nav-btn { align-self: center; margin-left: 0; }
        }
        main {
            flex: 1;
            max-width: 1280px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            width: 100%;
        }
        .card-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 16px 32px -12px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(120, 160, 110, 0.25);
        }
        .hero-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            align-items: center;
            margin-bottom: 2rem;
        }
        .hero-text { flex: 2; min-width: 240px; }
        .hero-text h1 {
            font-size: 2.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1f6233, #2d6a4f);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }
        .hero-text p { font-size: 1.05rem; color: #2e4a33; margin-bottom: 1.8rem; line-height: 1.5; }
        .hero-image {
            flex: 1.2;
            background: linear-gradient(125deg, #eaf5e4, #d4e4ca);
            border-radius: 1.8rem;
            padding: 1rem;
            text-align: center;
        }
        .hero-image img { max-width: 100%; border-radius: 1.2rem; box-shadow: 0 6px 14px rgba(0,0,0,0.1); }
        .feature-cards { display: flex; flex-wrap: wrap; gap: 1.2rem; margin: 2rem 0 1rem; }
        .mini-card {
            background: white;
            border-radius: 1.5rem;
            padding: 0.7rem 1.2rem;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            font-weight: 500;
        }
        .recruit-card {
            background: #fffaf0;
            border-left: 8px solid #c49a6c;
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 1.8rem;
        }
        .recruit-card h3 { color: #a25f2e; font-size: 1.5rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.6rem; }
        .recruit-card p { margin-bottom: 0.8rem; line-height: 1.65; color: #3c2a1f; }
        .recruit-card .quote { font-style: italic; color: #7a5a42; border-top: 1px dashed #e2c7a6; padding-top: 0.8rem; margin-top: 0.8rem; }
        footer {
            text-align: center;
            padding: 1.6rem;
            font-size: 0.8rem;
            color: #4a6e4d;
            border-top: 1px solid rgba(80, 120, 80, 0.2);
            background: rgba(249, 251, 245, 0.7);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #2b6e3c;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            color: #2b6e3c;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-outline:hover { background: #2b6e3c; color: white; }
    </style>
</head>
<body>
<div class="app">
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo-area">
                <div class="logo-icon"><i class="fas fa-atom"></i></div>
                <span class="logo-text">GSKChem · 化竞幻想乡</span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="active">主页</a>
                <a href="index.html?page=gsk" id="gskLink">GSKChem联考</a>
                <a href="bowuzhi.html">燕石博物志</a>
            </div>
            <!--<button class="auth-nav-btn" id="authRedirectBtn">
                <i class="fas fa-user-astronaut"></i> 
                 <span>登录 / 注册</span> 
                <i class="fas fa-arrow-right-to-bracket"></i>
            </button>
        </div> -->
    </nav>

    <main id="mainContent">
        <!-- 动态内容: 主页或联考 -->
    </main>

    <footer>
        <i class="far fa-copyright"></i> GSKChem
    </footer>
</div>

<script>
    // 模拟简单路由：通过 URL 参数 ?page=gsk 显示联考内容，否则显示主页
    const main = document.getElementById('mainContent');
    const gskLink = document.getElementById('gskLink');

    // 主页内容（包含铃奈庵纳新诏）
    const homePageContent = `
        <div class="card-panel">
            <div class="hero-grid">
                <div class="hero-text">
                    <h1><i class="fas fa-flask"></i> GSKChem · 化竞幻想乡</h1>
                    <p>一站式化学研习平台：联考测评、燕石博物志、邮箱+QQ注册系统。我们致力为化学爱好者与师生打造最纯净的学术社区。</p>
                    <div class="feature-cards">
                        <div class="mini-card"><i class="fas fa-file-signature"></i> GSKChem联考</div>
                        <div class="mini-card"><i class="fas fa-dragon"></i> 燕石博物志</div>
                        <div class="mini-card"><i class="fas fa-cloud-upload-alt"></i> 答题卡收集</div>
                        <div class="mini-card"><i class="fas fa-users"></i> 邮箱+QQ注册</div>
                    </div>
                </div>
                <div class="hero-image">
                    <img src="image/logo.jpg" alt="化学实验室氛围" style="width:100%; border-radius:1.2rem;">
                    <p style="margin-top:0.6rem; font-size:0.75rem; color:#56784a;">✨ 探索分子世界 · 智汇联考未来</p>
                </div>
            </div>
            <div style="margin-top: 1rem; background:#eef3ea; border-radius:1.5rem; padding:1rem;">
                <i class="fas fa-chalkboard-teacher"></i> <strong>答题卡收集系统预告</strong> —— 联考后将支持扫描图片上传，后台统一批阅，敬请期待。
            </div>
            <div class="recruit-card">
                <h3><i class="fas fa-scroll"></i> 「铃奈庵Group」 命题组纳新 诏</h3>
                <p>——「掺执子之衿，共饮朦胧月」</p>
                <p>谨启诸位志士：<br>
                万物复苏之季，润樱潜入风中轻拂魔法之森，铃奈庵的藏卷亦迎来初次整理之时。今特向全乡发布此招新昭告，诚邀有志者共执笔墨，续写此间篇章。</p>
                <p>............</p>
                <p>本庵不苛来者之才高，唯重热忱与诚挚。凡愿以严谨之心对待每一道试题，以谦逊之态聆听同侪之见，以持久之力精进自身之学养者，皆可应召入庵。</p>
                <p>是庵也，本无意追逐模拟题之乱花炫眼之凤，但力求贴近国初实况之朴素，且可出题以合理扩展考生思维，共赏化学之趣。“冀以尘雾之微，补益山海；萤烛末光，增辉日月”。虽微而明，愿脱颖而出，尽试题之高质。若君心存斯幻想乡，怀抱此精益求精之志，期子之临。</p>
                <p>......</p>
                <p class="quote">广招人才，纵汝自它方之命题组而来，亦可以来玩哦~</p>
            </div>
            <div class="feature-cards" style="margin-top:1.2rem;">
            </div>
        </div>
    `;

    const gskContent = `
        <div class="card-panel">
            <h2><i class="fas fa-chalkboard"></i> GSKChem联考专区</h2>
            <p style="margin: 1rem 0;">发布高质量模拟联考试卷，支持在线提交与答题卡收集。扫描图片上传功能正在开发，届时可便捷完成主观题收集。</p>
            <div style="background:#eef3e8; border-radius:1.5rem; padding:1rem; margin:1rem 0;">
                <i class="fas fa-upload"></i> <strong>答题卡收集系统</strong><br>
                联考期间，考生可将答题卡扫描为图片上传，后台统一整理、阅卷。敬请关注首场联考通知。
            </div>
            <button class="btn-outline" id="mockNotifyBtn"><i class="fas fa-bell"></i> 预约联考提醒</button>
        </div>
    `;

    function renderPage(page) {
        if (page === 'gsk') {
            main.innerHTML = gskContent;
            const btn = document.getElementById('mockNotifyBtn');
            if (btn) btn.addEventListener('click', () => alert('📢 联考提醒登记功能开发中，届时会通过邮箱通知。'));
            // 高亮导航
            document.querySelectorAll('.nav-links a').forEach(link => link.classList.remove('active'));
            const gskNav = document.querySelector('.nav-links a[href*="gsk"]');
            if (gskNav) gskNav.classList.add('active');
        } else {
            main.innerHTML = homePageContent;
            document.querySelectorAll('.nav-links a').forEach(link => link.classList.remove('active'));
            const homeNav = document.querySelector('.nav-links a[href="index.html"]');
            if (homeNav) homeNav.classList.add('active');
        }
    }

    // 处理 URL 参数
    const urlParams = new URLSearchParams(window.location.search);
    const pageParam = urlParams.get('page');
    if (pageParam === 'gsk') renderPage('gsk');
    else renderPage('home');

    // 点击 GSK 链接时，改变 URL 参数并重新渲染
    gskLink.addEventListener('click', (e) => {
        e.preventDefault();
        window.history.pushState({}, '', '?page=gsk');
        renderPage('gsk');
    });

    // 登录/注册按钮跳转
    const authBtn = document.getElementById('authRedirectBtn');
    authBtn.addEventListener('click', () => window.location.href = 'login.html');
</script>
</body>
</html>
