<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>注册 | 化学研习社</title>
    <!-- Google Font & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e9f5ec 0%, #d4e6da 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }

        /* 背景装饰 */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 10% 20%, rgba(43, 110, 60, 0.03) 0%, transparent 50%);
            pointer-events: none;
        }

        .auth-container {
            width: 100%;
            max-width: 500px;
            z-index: 2;
        }

        /* 卡片主视觉 */
        .auth-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(0px);
            border-radius: 2.5rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 2px 6px rgba(0, 0, 0, 0.02);
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .auth-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 30px 50px -15px rgba(0, 0, 0, 0.3);
        }

        .auth-header {
            background: linear-gradient(115deg, #1e4620, #2d6a4f);
            padding: 1.8rem 2rem;
            text-align: center;
            color: white;
        }

        .auth-header h1 {
            font-weight: 700;
            font-size: 1.9rem;
            letter-spacing: -0.3px;
            margin-bottom: 0.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
        }

        .auth-header p {
            opacity: 0.85;
            font-size: 0.9rem;
        }

        .auth-body {
            padding: 2rem 2rem 2.2rem;
        }

        /* 表单样式 */
        .input-group {
            display: flex;
            align-items: center;
            background: #f8fafc;
            border: 1px solid #e2edf2;
            border-radius: 1.2rem;
            padding: 0.7rem 1rem;
            margin-bottom: 1.2rem;
            transition: all 0.2s;
        }

        .input-group i {
            color: #6c8b6f;
            font-size: 1.1rem;
            width: 1.6rem;
            transition: color 0.2s;
        }

        .input-group input {
            border: none;
            background: transparent;
            flex: 1;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            font-weight: 500;
            color: #1f2e2a;
        }

        .input-group input::placeholder {
            color: #98ae9b;
            font-weight: 400;
        }

        .input-group:focus-within {
            border-color: #2b6e3c;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(43, 110, 60, 0.15);
        }

        .input-group:focus-within i {
            color: #2b6e3c;
        }

        /* 按钮 */
        .auth-btn {
            background: linear-gradient(95deg, #2b6e3c, #1f5430);
            border: none;
            width: 100%;
            padding: 0.85rem;
            border-radius: 2rem;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin: 0.5rem 0 1rem;
            box-shadow: 0 6px 12px -6px rgba(0, 0, 0, 0.2);
        }

        .auth-btn:hover {
            background: linear-gradient(95deg, #1f5430, #154623);
            transform: scale(0.98);
            box-shadow: 0 4px 8px -4px rgba(0, 0, 0, 0.2);
        }

        /* 条款提示 */
        .terms-note {
            font-size: 0.7rem;
            text-align: center;
            color: #6e8b72;
            margin: 1rem 0 0.5rem;
        }

        .auth-footer {
            text-align: center;
            font-size: 0.85rem;
            color: #4c6a4f;
            border-top: 1px solid #e6f0e8;
            padding-top: 1.2rem;
            margin-top: 0.8rem;
        }

        .auth-footer a {
            color: #1f5430;
            font-weight: 700;
            text-decoration: none;
            margin-left: 0.3rem;
            transition: 0.2s;
        }

        .auth-footer a:hover {
            text-decoration: underline;
            color: #0a3a1a;
        }

        .demo-note {
            background: #f1f9ef;
            border-radius: 1rem;
            padding: 0.5rem 0.8rem;
            font-size: 0.7rem;
            text-align: center;
            color: #2b6e3c;
            margin-top: 0.8rem;
        }

        /* 返回首页链接 */
        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,240,0.8);
            backdrop-filter: blur(4px);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #1f5430;
            text-decoration: none;
            transition: 0.2s;
            width: fit-content;
        }

        .back-home i {
            font-size: 0.8rem;
        }

        .back-home:hover {
            background: white;
            color: #0e3b1c;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        @media (max-width: 500px) {
            .auth-body {
                padding: 1.6rem;
            }
            .auth-header h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1>
                <i class="fas fa-user-plus"></i> 
                注册新账号
            </h1>
            <p>加入化学研习社 · 开启智慧联考</p>
        </div>
        <div class="auth-body">
            <form id="registerForm">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="regEmail" placeholder="电子邮箱" required autocomplete="email">
                </div>
                <div class="input-group">
                    <i class="fab fa-qq"></i>
                    <input type="text" id="regQQ" placeholder="QQ号" required pattern="[1-9][0-9]{4,14}" title="请输入有效的QQ号 (5-11位数字)">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="regPassword" placeholder="密码" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-check-circle"></i>
                    <input type="password" id="regConfirmPwd" placeholder="确认密码" required>
                </div>
                <button type="submit" class="auth-btn">
                    <i class="fas fa-user-check"></i> 立即注册
                </button>
                <div class="terms-note">
                    <i class="fas fa-shield-alt"></i> 注册即表示同意《用户协议》及《隐私政策》
                </div>
                <div class="demo-note">
                    <i class="fas fa-laptop-code"></i> 演示模式：信息仅前端模拟，不会上传真实数据
                </div>
            </form>
            <div class="auth-footer">
                已有账号？
                <a href="login.html" id="toLoginLink">直接登录 <i class="fas fa-chevron-right"></i></a>
            </div>
        </div>
    </div>
    <div style="display: flex; justify-content: center;">
        <a href="index.html" class="back-home"><i class="fas fa-home"></i> 返回首页</a>
    </div>
</div>

<script>
    const registerForm = document.getElementById('registerForm');
    
    if (registerForm) {
        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('regEmail').value.trim();
            const qq = document.getElementById('regQQ').value.trim();
            const pwd = document.getElementById('regPassword').value;
            const confirmPwd = document.getElementById('regConfirmPwd').value;
            
            // 基础验证
            if (!email || !qq || !pwd || !confirmPwd) {
                alert('请完整填写所有字段');
                return;
            }
            const emailRegex = /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/;
            if (!emailRegex.test(email)) {
                alert('请输入有效的电子邮箱地址');
                return;
            }
            if (!/^[1-9][0-9]{4,14}$/.test(qq)) {
                alert('请输入有效的QQ号（5-11位数字）');
                return;
            }
            if (pwd.length < 4) {
                alert('密码长度至少为4位');
                return;
            }
            if (pwd !== confirmPwd) {
                alert('两次输入的密码不一致');
                return;
            }
            
            // 演示成功提示
            alert(`🎉 注册成功！\n欢迎 ${email}\nQQ号：${qq}\n（演示模式，请记住您的账号信息）`);
            // 跳转至登录页
            window.location.href = 'login.html';
        });
    }
</script>
</body>
</html>
