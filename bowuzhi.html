<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>燕石博物志 · 图卷 | GSKChem · 化竞幻想乡</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #2e241e;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }
        /* 仿古纹理 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" opacity="0.08"><path d="M10 10 L190 10 M10 30 L190 30 M10 50 L190 50 M10 70 L190 70 M10 90 L190 90 M10 110 L190 110 M10 130 L190 130 M10 150 L190 150 M10 170 L190 170 M10 190 L190 190" stroke="%23aa8866" stroke-width="1" fill="none"/><path d="M10 10 L10 190 M30 10 L30 190 M50 10 L50 190 M70 10 L70 190 M90 10 L90 190 M110 10 L110 190 M130 10 L130 190 M150 10 L150 190 M170 10 L170 190 M190 10 L190 190" stroke="%23aa8866" stroke-width="1" fill="none"/></svg>');
            background-repeat: repeat;
            background-size: 20px 20px;
            pointer-events: none;
            z-index: 0;
        }
        /* 滑动面板容器 */
        .slider-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 2;
        }
        .slider-track {
            display: flex;
            height: 100%;
            transition: transform 0.3s ease-out;
            will-change: transform;
        }
        .page {
            width: 100%;
            height: 100%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fdf8f0;
            box-shadow: inset 0 0 0 1px rgba(180, 150, 120, 0.3);
            position: relative;
            padding: 1.5rem;
            cursor: pointer;
        }
        .page-image {
            max-width: 90%;
            max-height: 85%;
            object-fit: contain;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            background: #f0e8d8;
            transition: transform 0.2s;
        }
        .page-image:active {
            transform: scale(0.98);
        }
        .image-caption {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.8rem;
            color: #8b765a;
            background: rgba(255,250,235,0.7);
            padding: 6px 12px;
            width: fit-content;
            margin: 0 auto;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            font-weight: 500;
            pointer-events: none;
        }
        /* 顶部栏 */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(30, 20, 15, 0.75);
            backdrop-filter: blur(12px);
            padding: 10px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 30;
            border-bottom: 1px solid rgba(210, 180, 140, 0.3);
        }
        .home-link {
            color: #f0e0c0;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            background: rgba(0,0,0,0.3);
            padding: 5px 12px;
            border-radius: 30px;
            transition: 0.2s;
        }
        .home-link:hover {
            background: #5a3a28;
            color: white;
        }
        .book-title {
            font-weight: 600;
            font-size: 0.85rem;
            color: #ecd8b0;
        }
        .auth-btn-mini {
            background: #2b6e3c;
            border: none;
            padding: 5px 12px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.75rem;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        /* 页码指示器 */
        .pagination-indicator {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 20;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(8px);
            width: fit-content;
            margin: 0 auto;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #ffefcf;
            font-family: monospace;
            pointer-events: none;
        }
        /* 左右箭头 */
        .nav-arrow {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(6px);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 20;
            transition: 0.2s;
            opacity: 0.7;
        }
        .nav-arrow:hover {
            opacity: 1;
            background: rgba(80, 60, 40, 0.8);
        }
        .nav-left { left: 16px; }
        .nav-right { right: 16px; }

        /* 图片放大模态框 */
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .modal-img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            z-index: 1001;
        }
        .close-modal:hover {
            color: #c49a6c;
        }

        @media (max-width: 680px) {
            .page { padding: 0.8rem; }
            .nav-arrow { width: 36px; height: 36px; font-size: 1.2rem; }
            .close-modal { top: 15px; right: 20px; font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="index.html" class="home-link"><i class="fas fa-arrow-left"></i> 返回书阁</a>
        <span class="book-title"><i class="fas fa-images"></i> 燕石博物志 · 创刊号</span>
        <!-- <button class="auth-btn-mini" id="topAuthBtn"><i class="fas fa-user"></i> 登录/注册</button> -->
    </div>

    <div class="slider-container" id="sliderContainer">
        <div class="slider-track" id="sliderTrack">
            <div class="page"><img class="page-image" src="image/1.jpg" alt="第1页"></div>
            <div class="page"><img class="page-image" src="image/2.jpg" alt="第2页"></div>
            <div class="page"><img class="page-image" src="image/3.jpg" alt="第3页"></div>
            <div class="page"><img class="page-image" src="image/4.jpg" alt="第4页"></div>
            <div class="page"><img class="page-image" src="image/5.jpg" alt="第5页"></div>
            <div class="page"><img class="page-image" src="image/6.jpg" alt="第6页"></div>
            <div class="page"><img class="page-image" src="image/7.jpg" alt="第7页"></div>
            <div class="page"><img class="page-image" src="image/8.jpg" alt="第8页"></div>
        </div>
    </div>

    <!-- 图片放大模态框 -->
    <div id="imageModal" class="image-modal">
        <span class="close-modal">&times;</span>
        <img class="modal-img" id="modalImg" src="" alt="放大图片">
    </div>

    <div class="pagination-indicator"><span id="currentPage">1</span> / <span id="totalPages">8</span></div>
    <div class="nav-arrow nav-left" id="prevBtn"><i class="fas fa-chevron-left"></i></div>
    <div class="nav-arrow nav-right" id="nextBtn"><i class="fas fa-chevron-right"></i></div>

    <script>
        (function() {
            const track = document.getElementById('sliderTrack');
            const pages = document.querySelectorAll('.page');
            const total = pages.length;
            let currentIndex = 0;
            let startX = 0;
            let startTransform = 0;
            let isDragging = false;
            let currentTranslate = 0;

            const curSpan = document.getElementById('currentPage');
            const totalSpan = document.getElementById('totalPages');
            if (totalSpan) totalSpan.innerText = total;

            // 更新位置
            function updatePosition(animate = true) {
                const containerWidth = document.querySelector('.slider-container').clientWidth;
                const newTranslate = -currentIndex * containerWidth;
                currentTranslate = newTranslate;
                if (animate) {
                    track.style.transition = 'transform 0.3s ease-out';
                } else {
                    track.style.transition = 'none';
                }
                track.style.transform = `translateX(${newTranslate}px)`;
                if (curSpan) curSpan.innerText = currentIndex + 1;
            }

            function goToPage(index) {
                if (index < 0) index = 0;
                if (index >= total) index = total - 1;
                if (index === currentIndex) return;
                currentIndex = index;
                updatePosition(true);
            }

            function nextPage() { if (currentIndex < total - 1) goToPage(currentIndex + 1); }
            function prevPage() { if (currentIndex > 0) goToPage(currentIndex - 1); }

            // 按钮事件
            document.getElementById('prevBtn').addEventListener('click', prevPage);
            document.getElementById('nextBtn').addEventListener('click', nextPage);

            // 触摸滑动
            const container = document.getElementById('sliderContainer');
            container.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                startTransform = currentTranslate;
                isDragging = true;
                track.style.transition = 'none';
            });
            container.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                const dx = e.touches[0].clientX - startX;
                let newTransform = startTransform + dx;
                const maxLeft = 0;
                const minRight = -(total - 1) * container.clientWidth;
                if (newTransform > maxLeft) newTransform = maxLeft + (newTransform - maxLeft) * 0.3;
                if (newTransform < minRight) newTransform = minRight + (newTransform - minRight) * 0.3;
                track.style.transform = `translateX(${newTransform}px)`;
            });
            container.addEventListener('touchend', (e) => {
                if (!isDragging) return;
                isDragging = false;
                const dx = e.changedTouches[0].clientX - startX;
                const containerWidth = container.clientWidth;
                const threshold = containerWidth * 0.2;
                let targetIndex = currentIndex;
                if (Math.abs(dx) > threshold) {
                    if (dx < 0) targetIndex = currentIndex + 1;
                    else targetIndex = currentIndex - 1;
                } else {
                    const ratio = (startTransform - currentTranslate) / containerWidth;
                    if (Math.abs(ratio) > 0.3) {
                        if (ratio > 0) targetIndex = currentIndex - 1;
                        else targetIndex = currentIndex + 1;
                    }
                }
                targetIndex = Math.min(Math.max(targetIndex, 0), total - 1);
                if (targetIndex !== currentIndex) {
                    currentIndex = targetIndex;
                    updatePosition(true);
                } else {
                    updatePosition(true);
                }
            });

            window.addEventListener('resize', () => {
                updatePosition(false);
                setTimeout(() => updatePosition(false), 50);
            });
            window.addEventListener('load', () => updatePosition(false));
            updatePosition(false);

            // ----- 图片点击放大功能 -----
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImg');
            const closeModal = document.querySelector('.close-modal');

            // 为所有图片添加点击事件（事件委托）
            document.querySelector('.slider-track').addEventListener('click', (e) => {
                let target = e.target;
                // 向上查找是否点击到了 .page-image
                while (target && !target.classList.contains('page-image')) {
                    if (target === document.querySelector('.slider-track')) return;
                    target = target.parentElement;
                }
                if (target && target.classList.contains('page-image')) {
                    const imgSrc = target.getAttribute('src');
                    if (imgSrc) {
                        modal.style.display = 'flex';
                        modalImg.src = imgSrc;
                    }
                    e.stopPropagation();  // 防止触发滑动容器的其他事件
                }
            });

            // 关闭模态框：点击遮罩或关闭按钮
            function closeModalFunc() {
                modal.style.display = 'none';
                modalImg.src = '';
            }
            modal.addEventListener('click', (e) => {
                if (e.target === modal || e.target === closeModal) {
                    closeModalFunc();
                }
            });
            // 按 ESC 键关闭
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modal.style.display === 'flex') {
                    closeModalFunc();
                }
            });

            // 登录按钮
            // const authBtn = document.getElementById('topAuthBtn');
            //if (authBtn) {
                //authBtn.addEventListener('click', () => {
                    //window.location.href = 'login.html';
                //});
            //}
        })();
    </script>
</body>
</html>
